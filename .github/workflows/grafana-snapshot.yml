name: grafana-snapshot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: grafana-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright (Chromium)
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install playwright@^1.49 >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Run Grafana snapshot
        env:
          GRAFANA_USER: ${{ secrets.GRAFANA_USER }}
          GRAFANA_PASS: ${{ secrets.GRAFANA_PASS }}
          GRAFANA_BASE: https://gkoilfield.grafana.net
          SNAPSHOT_MODE: targeted
          DASH_PATHS: /d/tasp46j/supreme-on-the-fly-water-treatment,/d/tan2hlz/supreme-on-the-fly-tank-levels
        run: node scripts/grafana-snapshot.mjs

      - name: Publish snapshot to Supabase (gated write)
        env:
          SNAPSHOT_WRITE_KEY: ${{ secrets.SNAPSHOT_WRITE_KEY }}
        run: |
          test -f data/live_snapshot.json
          node -e '
            const s = require("./data/live_snapshot.json");
            const body = { customer_code: "DOUBLE_EAGLE", pad: s.pad || null, updated_at: s.updatedAt,
              payload: { source: s.source, window: s.window, interval: s.interval, seriesCount: s.seriesCount, series: s.series } };
            require("fs").writeFileSync("data/put-body.json", JSON.stringify(body));
          '
          curl -sf -X POST "https://bfpsvvojskrbzrhcuuwe.supabase.co/functions/v1/snapshot-put" \
            -H "Content-Type: application/json" \
            -H "x-snapshot-key: ${SNAPSHOT_WRITE_KEY}" \
            --data @data/put-body.json | grep -q '"ok":true' && echo "snapshot published"

      - name: Upload snapshot (private artifact, not public)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grafana-snapshot
          path: data/
          retention-days: 7
