// Simple SHA-256 hash (built into browsers)
async function hashPassword(pw) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

const AppWithAuth = () => {
  const [authedUser, setAuthedUser] = useState(null);

  useEffect(() => {
    // Check for existing session
    try {
      const session = JSON.parse(sessionStorage.getItem("sct_auth"));
      if (session && session.email && (Date.now() - session.ts) < 8 * 60 * 60 * 1000) { // 8 hour session
        setAuthedUser(session.email);
      }
    } catch(e) {}
  }, []);

  if (!authedUser) {
    return <LoginScreen onLogin={setAuthedUser} />;
  }

  return <Dashboard userEmail={authedUser} onLogout={() => { sessionStorage.removeItem("sct_auth"); setAuthedUser(null); }} />;
};

/* ═══════════════════════════════════════════════
   SENSOR GAUGE
   ═══════════════════════════════════════════════ */
const SensorGauge = ({ label, value, unit, min, max, thresholds, icon, precision=1 }) => {
  const pct = Math.max(0, Math.min(100, ((value-min)/(max-min))*100));
  let status = "normal";
  if (thresholds) {
    if (value <= thresholds.critical) status = "critical";
    else if (value <= thresholds.warn) status = "warning";
    else status = "good";
  }
  const colors = { good:"#22c55e", normal:"#22d3ee", warning:"#f59e0b", critical:"#ef4444" };
  const col = colors[status];

  return (
    <div style={{ background:"rgba(15,23,42,0.7)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, padding:"20px 24px", position:"relative", overflow:"hidden", backdropFilter:"blur(10px)" }}>
      <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:`linear-gradient(90deg, ${col}00, ${col}, ${col}00)`, opacity:0.6 }}/>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12, color:"rgba(255,255,255,0.5)", fontSize:12, fontWeight:600, letterSpacing:1.5, textTransform:"uppercase" }}>
        <span style={{ color:col, opacity:0.8 }}><Icon type={icon} size={14}/></span>{label}
      </div>
      <div style={{ display:"flex", alignItems:"baseline", gap:6 }}>
        <span style={{ fontSize:36, fontWeight:700, color:col, fontFamily:"'JetBrains Mono',monospace", lineHeight:1 }}>
          {typeof value==="number" ? value.toFixed(precision) : value}
        </span>
        <span style={{ fontSize:14, color:"rgba(255,255,255,0.4)", fontWeight:500 }}>{unit}</span>
      </div>
      <div style={{ marginTop:14, height:4, background:"rgba(255,255,255,0.06)", borderRadius:2, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${pct}%`, background:`linear-gradient(90deg, ${col}88, ${col})`, borderRadius:2, transition:"width 0.8s ease" }}/>
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", marginTop:4, fontSize:10, color:"rgba(255,255,255,0.25)" }}>
        <span>{min}</span><span>{max}</span>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════
   SPARKLINE
   ═══════════════════════════════════════════════ */
const Sparkline = ({ data, color="#22d3ee", height=48 }) => {
  const vals = data.map(d => d.v);
  const mn = Math.min(...vals), mx = Math.max(...vals), range = mx-mn||1;
  const w = 600;
  const pts = vals.map((v,i) => `${(i/(vals.length-1))*w},${height-((v-mn)/range)*(height-4)-2}`).join(" ");
  return (
    <svg viewBox={`0 0 ${w} ${height}`} style={{ width:"100%", height }}>
      <defs>
        <linearGradient id="sf" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.15"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={`0,${height} ${pts} ${w},${height}`} fill="url(#sf)"/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5"/>
      {/* current value dot */}
      {vals.length > 0 && (() => {
        const lastPt = pts.split(" ").pop().split(",");
        return <circle cx={lastPt[0]} cy={lastPt[1]} r="3" fill={color} style={{ filter:`drop-shadow(0 0 4px ${color})` }}/>;
      })()}
    </svg>
  );
};

        <span style={{ fontSize:12, color:"rgba(255,255,255,0.35)" }}>/ {capacity} {unit}</span>
      </div>
      <div style={{ height:8, background:"rgba(255,255,255,0.06)", borderRadius:4, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${pct}%`, background:`linear-gradient(90deg, ${color}88, ${color})`, borderRadius:4, transition:"width 1s ease" }}/>
      </div>
      <div style={{ textAlign:"right", fontSize:10, color:"rgba(255,255,255,0.3)", marginTop:4 }}>{pct.toFixed(0)}% full</div>
    </div>
  );
};

/* ═══════════════════════════════════════════════
   MAIN DASHBOARD
   ═══════════════════════════════════════════════ */
function Dashboard({ userEmail, onLogout }) {
  const [data, setData] = useState({
    orp: genORP(), ph: genPH(), tds: +genTDS(), flowRate: genRate(), h2o2Active: false,
    orpHistory: Array.from({length:40}, (_,i) => ({t:i, v:genORP()})),
  });
  const [tanks, setTanks] = useState(INITIAL_TANKS);
  const [activeTab, setActiveTab] = useState("dashboard");
  const [docFilter, setDocFilter] = useState("All");
  const [time, setTime] = useState(new Date());
  const [hoveredDoc, setHoveredDoc] = useState(null);

  useEffect(() => {
    const iv = setInterval(() => {
      setData(prev => {
        const newORP = genORP();
        return {
          orp: newORP, ph: genPH(), tds: +genTDS(), flowRate: genRate(),
          h2o2Active: newORP < 190,
          orpHistory: [...prev.orpHistory.slice(-39), {t:prev.orpHistory.length, v:newORP}],
        };
      });
      setTime(new Date());
    }, 3000);
    return () => clearInterval(iv);
  }, []);

  // Today's cost
  const today = DAILY_USAGE[DAILY_USAGE.length-1];
  const costTQ20  = today.tq20  * 8.95;
  const costSI211 = today.si211 * 3.00;
  const costH2O2  = today.h2o2  * 2.15;
  const totalCost = costTQ20 + costSI211 + costH2O2;
  const costPerBbl = totalCost / today.bbl;

  // 7-day totals
  const weekTotals = DAILY_USAGE.reduce((acc,d) => ({
    bbl: acc.bbl+d.bbl, tq20: acc.tq20+d.tq20, si211: acc.si211+d.si211, h2o2: acc.h2o2+d.h2o2
  }), {bbl:0,tq20:0,si211:0,h2o2:0});
  const weekCost = weekTotals.tq20*8.95 + weekTotals.si211*3.00 + weekTotals.h2o2*2.15;

  const filteredDocs = docFilter==="All" ? DOCS : DOCS.filter(d => d.cat===docFilter);

  const tabBtn = (id, label, icon) => (
    <button key={id} onClick={() => setActiveTab(id)} style={{
      padding:"10px 20px", borderRadius:"8px 8px 0 0", border:"none", cursor:"pointer",
      fontSize:13, fontWeight:600, display:"flex", alignItems:"center", gap:6,
      background: activeTab===id ? "rgba(255,255,255,0.06)" : "transparent",
      color: activeTab===id ? "#e2e8f0" : "rgba(255,255,255,0.35)",
      borderBottom: activeTab===id ? "2px solid #22d3ee" : "2px solid transparent",
      transition:"all 0.2s", fontFamily:"'DM Sans',sans-serif",
    }}>
      <Icon type={icon} size={14}/> {label}
    </button>
  );

  return (
    <div style={{ minHeight:"100vh" }}>
      {/* BG */}
      <div style={{ position:"fixed", inset:0, zIndex:0, pointerEvents:"none", background:"radial-gradient(ellipse at 20% 0%, rgba(34,211,238,0.04) 0%, transparent 60%), radial-gradient(ellipse at 80% 100%, rgba(167,139,250,0.03) 0%, transparent 60%)" }}/>

      {/* ── HEADER ── */}
      <header style={{ position:"sticky", top:0, zIndex:50, background:"rgba(7,11,20,0.9)", backdropFilter:"blur(20px)", borderBottom:"1px solid rgba(255,255,255,0.05)", padding:"0 32px" }}>
        <div style={{ maxWidth:1400, margin:"0 auto", display:"flex", alignItems:"center", justifyContent:"space-between", height:64 }}>
          <div style={{ display:"flex", alignItems:"center", gap:16 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ width:34, height:34, borderRadius:8, background:"linear-gradient(135deg, #1B2A3D, #2E75B6)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                <span style={{ color:"#8FAADC", fontWeight:700, fontSize:15 }}>S</span>
              </div>
              <div>
                <div style={{ fontSize:14, fontWeight:700, color:"#e2e8f0", letterSpacing:0.5 }}>SUPREME CHEMICAL TECHNOLOGY</div>
                <div style={{ fontSize:10, color:"rgba(255,255,255,0.35)", letterSpacing:1 }}>OTF MONITORING PORTAL</div>
              </div>
            </div>
            <div style={{ width:1, height:28, background:"rgba(255,255,255,0.08)", margin:"0 8px" }}/>
            <div style={{ fontSize:13, color:"rgba(255,255,255,0.5)" }}>Double Eagle Energy — Reagan County</div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:20 }}>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div style={{ width:7, height:7, borderRadius:"50%", background:"#22c55e", boxShadow:"0 0 8px #22c55e88" }}/>
              <span style={{ fontSize:11, color:"#22c55e", fontWeight:600, letterSpacing:0.5 }}>LIVE</span>
            </div>
            <span style={{ fontSize:12, color:"rgba(255,255,255,0.4)", fontFamily:"'JetBrains Mono',monospace" }}>
              {time.toLocaleTimeString("en-US",{hour12:true})}
            </span>
            <div style={{ display:"flex", alignItems:"center", gap:6, marginLeft:8, padding:"5px 12px", borderRadius:6, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.06)" }}>
              <Icon type="user" size={14}/><span style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>{userEmail}</span>
            </div>
            <button onClick={onLogout} style={{
              padding:"5px 12px", borderRadius:6, border:"1px solid rgba(255,255,255,0.06)",
              background:"rgba(255,255,255,0.04)", cursor:"pointer", fontSize:11, fontWeight:600,
              color:"rgba(255,255,255,0.4)", fontFamily:"'DM Sans',sans-serif", transition:"all 0.15s",
            }}
            onMouseEnter={e => { e.currentTarget.style.borderColor="rgba(239,68,68,0.3)"; e.currentTarget.style.color="#f87171"; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor="rgba(255,255,255,0.06)"; e.currentTarget.style.color="rgba(255,255,255,0.4)"; }}>
              Sign Out
            </button>
          </div>
        </div>
      </header>

      {/* ── NAV ── */}
      <nav style={{ maxWidth:1400, margin:"0 auto", padding:"16px 32px 0", display:"flex", gap:4, position:"relative", zIndex:10 }}>
        {tabBtn("dashboard","Live Dashboard","activity")}
        {tabBtn("inventory","Inventory & Cost","box")}
        {tabBtn("documents","Documents","folder")}
      </nav>

      <main style={{ maxWidth:1400, margin:"0 auto", padding:"20px 32px 60px", position:"relative", zIndex:10 }}>

        {/* ═══════ DASHBOARD ═══════ */}
        {activeTab==="dashboard" && (
          <div className="fade-in">
            {/* H2O2 Banner */}
            <div style={{
              marginBottom:20, padding:"12px 20px", borderRadius:10,
              background: data.h2o2Active ? "rgba(251,191,36,0.08)" : "rgba(34,197,94,0.06)",
              border:`1px solid ${data.h2o2Active ? "rgba(251,191,36,0.2)" : "rgba(34,197,94,0.15)"}`,
              display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8,
            }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{
                  width:10, height:10, borderRadius:"50%",
                  background: data.h2o2Active ? "#fbbf24" : "#22c55e",
                  boxShadow:`0 0 10px ${data.h2o2Active ? "#fbbf2488" : "#22c55e88"}`,
                  animation: data.h2o2Active ? "pulse 1.5s ease-in-out infinite" : "none",
                }}/>
                <span style={{ fontSize:13, fontWeight:600, color: data.h2o2Active ? "#fbbf24" : "#22c55e" }}>
                  {data.h2o2Active ? "H₂O₂ PUMP ACTIVE — Demand injection in progress" : "H₂O₂ PUMP STANDBY — ORP positive, no injection required"}
                </span>
              </div>
              <span style={{ fontSize:11, color:"rgba(255,255,255,0.3)" }}>Peroxide pumps only when negative ORP is detected</span>
            </div>

            {/* Gauges */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(220px, 1fr))", gap:16, marginBottom:20 }}>
              <SensorGauge label="ORP" value={data.orp} unit="mV" min={-250} max={400} icon="zap" thresholds={{critical:0,warn:150}} precision={1}/>
              <SensorGauge label="pH" value={data.ph} unit="" min={0} max={14} icon="droplet" precision={2}/>
              <SensorGauge label="TDS" value={data.tds} unit="mg/L" min={0} max={200000} icon="gauge" precision={0}/>
              <SensorGauge label="Flow Rate" value={data.flowRate} unit="bbl/min" min={0} max={100} icon="activity" precision={1}/>
            </div>

            {/* ORP Trend */}
            <div style={{ background:"rgba(15,23,42,0.7)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, padding:"20px 24px", backdropFilter:"blur(10px)" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                <div style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,0.5)", letterSpacing:1.5, textTransform:"uppercase" }}>ORP Trend — Last 40 Readings</div>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <div style={{ width:6, height:6, borderRadius:"50%", background:"#22d3ee", animation:"pulse 2s infinite" }}/>
                  <span style={{ fontSize:11, color:"rgba(255,255,255,0.25)" }}>Live — updates every 3s</span>
                </div>
              </div>
              <Sparkline data={data.orpHistory} color="#22d3ee" height={90}/>
              <div style={{ display:"flex", justifyContent:"space-between", marginTop:8, fontSize:10, color:"rgba(255,255,255,0.25)", flexWrap:"wrap", gap:8 }}>
                <span>Older</span>
                <div style={{ display:"flex", gap:16 }}>
                  <span style={{color:"#22c55e"}}>● Good (&gt;150 mV)</span>
                  <span style={{color:"#f59e0b"}}>● Warning (0–150 mV)</span>
                  <span style={{color:"#ef4444"}}>● Critical (&lt;0 mV → H₂O₂ activates)</span>
                </div>
                <span>Now</span>
              </div>
            </div>
          </div>
        )}

        {/* ═══════ INVENTORY & COST ═══════ */}
        {activeTab==="inventory" && (
          <div className="fade-in">
            {/* Tanks */}
            <div style={{ fontSize:12, color:"rgba(255,255,255,0.35)", marginBottom:16, letterSpacing:0.5 }}>
              Isotainer levels updated daily. Cost calculated from actual metered usage.
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(280px, 1fr))", gap:16, marginBottom:24 }}>
              {tanks.map(t => <TankLevel key={t.id} {...t}/>)}
            </div>

            {/* Cost — Two columns */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:24 }}>
              {/* Daily breakdown */}
              <div style={{ background:"rgba(15,23,42,0.7)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, padding:"24px 28px", backdropFilter:"blur(10px)" }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:20 }}>
                  <span style={{color:"#22d3ee"}}><Icon type="dollar" size={16}/></span>
                  <span style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,0.5)", letterSpacing:1.5, textTransform:"uppercase" }}>Today's Cost</span>
                </div>
                <table style={{ width:"100%", borderCollapse:"collapse" }}>
                  <thead>
                    <tr style={{ borderBottom:"1px solid rgba(255,255,255,0.08)" }}>
                      {["Product","Gal","Cost"].map(h => (
                        <th key={h} style={{ padding:"8px 10px", fontSize:11, fontWeight:600, color:"rgba(255,255,255,0.4)", textAlign: h==="Product"?"left":"right", letterSpacing:0.5 }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {[
                      {name:"TQ-20", usage:today.tq20, cost:costTQ20, color:"#22d3ee"},
                      {name:"SI-211", usage:today.si211, cost:costSI211, color:"#a78bfa"},
                      {name:"H₂O₂ (34%)", usage:today.h2o2, cost:costH2O2, color:"#fbbf24"},
                    ].map((r,i) => (
                      <tr key={i} style={{ borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
                        <td style={{ padding:"10px", fontSize:13, color:"rgba(255,255,255,0.7)" }}>
                          <span style={{ display:"inline-block", width:8, height:8, borderRadius:2, background:r.color, marginRight:8 }}/>{r.name}
                        </td>
                        <td style={{ padding:"10px", fontSize:13, fontFamily:"'JetBrains Mono',monospace", color:"rgba(255,255,255,0.5)", textAlign:"right" }}>{r.usage.toFixed(1)}</td>
                        <td style={{ padding:"10px", fontSize:14, fontFamily:"'JetBrains Mono',monospace", fontWeight:600, color:"rgba(255,255,255,0.9)", textAlign:"right" }}>${r.cost.toFixed(2)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div style={{ borderTop:"2px solid rgba(34,211,238,0.15)", marginTop:4, paddingTop:12, display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
                  <div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.3)" }}>{today.bbl.toLocaleString()} bbl treated</div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.3)", marginTop:2 }}>${costPerBbl.toFixed(4)} /bbl</div>
                  </div>
                  <div style={{ fontSize:28, fontWeight:700, color:"#22d3ee", fontFamily:"'JetBrains Mono',monospace" }}>${totalCost.toFixed(2)}</div>
                </div>
              </div>

              {/* 7-day chart */}
              <div style={{ background:"rgba(15,23,42,0.7)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, padding:"24px 28px", backdropFilter:"blur(10px)" }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:20 }}>
                  <span style={{color:"#a78bfa"}}><Icon type="chart" size={16}/></span>
                  <span style={{ fontSize:12, fontWeight:600, color:"rgba(255,255,255,0.5)", letterSpacing:1.5, textTransform:"uppercase" }}>7-Day Cost Trend</span>
                </div>
                <CostChart data={DAILY_USAGE}/>
                <div style={{ borderTop:"1px solid rgba(255,255,255,0.06)", marginTop:16, paddingTop:12, display:"flex", justifyContent:"space-between" }}>
                  <div style={{ fontSize:11, color:"rgba(255,255,255,0.3)" }}>
                    {weekTotals.bbl.toLocaleString()} bbl total · ${(weekCost/weekTotals.bbl).toFixed(4)}/bbl avg
                  </div>
                  <div style={{ fontSize:14, fontWeight:600, color:"#a78bfa", fontFamily:"'JetBrains Mono',monospace" }}>
                    ${weekCost.toFixed(2)} <span style={{ fontSize:11, color:"rgba(255,255,255,0.3)", fontWeight:400 }}>7-day total</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ═══════ DOCUMENTS ═══════ */}
        {activeTab==="documents" && (
          <div className="fade-in">
            <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
              {[
                {id:"All", label:"All Documents"},
                {id:"SDS", label:"Safety Data Sheets"},
                {id:"Field", label:"Field Reports"},
                {id:"Lab", label:"Lab Reports"},
              ].map(f => (
                <button key={f.id} onClick={() => setDocFilter(f.id)} style={{
                  padding:"7px 16px", borderRadius:6, border:"1px solid", fontSize:12, fontWeight:600, cursor:"pointer", transition:"all 0.2s",
                  background: docFilter===f.id ? "rgba(34,211,238,0.1)" : "transparent",
                  borderColor: docFilter===f.id ? "rgba(34,211,238,0.3)" : "rgba(255,255,255,0.08)",
                  color: docFilter===f.id ? "#22d3ee" : "rgba(255,255,255,0.4)",
                  fontFamily:"'DM Sans',sans-serif",
                }}>{f.label}</button>
              ))}
            </div>

            <div style={{ background:"rgba(15,23,42,0.7)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, overflow:"hidden", backdropFilter:"blur(10px)" }}>
              {filteredDocs.map((doc,i) => {
                const catColors = { SDS:"#ef4444", Field:"#22d3ee", Lab:"#a78bfa" };
                const c = catColors[doc.cat];
                return (
                  <div key={i} style={{
                    display:"flex", alignItems:"center", justifyContent:"space-between",
                    padding:"14px 24px", borderBottom: i<filteredDocs.length-1 ? "1px solid rgba(255,255,255,0.04)" : "none",
                    background: hoveredDoc===i ? "rgba(255,255,255,0.03)" : "transparent", transition:"background 0.15s", cursor:"pointer",
                  }} onMouseEnter={() => setHoveredDoc(i)} onMouseLeave={() => setHoveredDoc(null)}>
                    <div style={{ display:"flex", alignItems:"center", gap:14, minWidth:0 }}>
                      <div style={{ width:36, height:36, borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0,
                        background:`${c}15`, color:c }}>
                        <Icon type={doc.cat==="SDS" ? "shield" : "file"} size={16}/>
                      </div>
                      <div style={{ minWidth:0 }}>
                        <div style={{ fontSize:13, fontWeight:500, color:"rgba(255,255,255,0.85)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{doc.name}</div>
                        <div style={{ fontSize:11, color:"rgba(255,255,255,0.3)", marginTop:2 }}>
                          <span style={{ display:"inline-block", padding:"1px 6px", borderRadius:3, fontSize:10, fontWeight:600, marginRight:8, background:`${c}15`, color:c }}>{doc.cat}</span>
                          {doc.date} · {doc.size}
                        </div>
                      </div>
                    </div>
                    <button style={{
                      background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)",
                      borderRadius:6, padding:"6px 14px", cursor:"pointer", flexShrink:0,
                      display:"flex", alignItems:"center", gap:5, fontSize:11, fontWeight:600,
                      color: hoveredDoc===i ? "#22d3ee" : "rgba(255,255,255,0.5)",
                      borderColor: hoveredDoc===i ? "rgba(34,211,238,0.3)" : "rgba(255,255,255,0.08)",
                      transition:"all 0.15s", fontFamily:"'DM Sans',sans-serif",
                    }}>
                      <Icon type="download" size={12}/> Download
                    </button>
                  </div>
                );
              })}
            </div>

            <div style={{ marginTop:16, padding:"12px 16px", borderRadius:8, background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.04)", fontSize:11, color:"rgba(255,255,255,0.3)" }}>
              Documents are uploaded by SCT and available for download at any time. For additional reports or data requests, contact your SCT representative at (432) 701-0318.
            </div>
          </div>
        )}
      </main>

      {/* Footer */}
      <footer style={{ borderTop:"1px solid rgba(255,255,255,0.04)", padding:"16px 32px", textAlign:"center" }}>
        <span style={{ fontSize:11, color:"rgba(255,255,255,0.2)" }}>
          © 2026 Supreme Chemical Technology · Midland, TX · (432) 701-0318 · All data is proprietary and confidential
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppWithAuth/>);
</script>
