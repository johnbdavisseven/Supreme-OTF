// ── Copy & Inspection Protection ──
// Block right-click context menu
document.addEventListener("contextmenu", function(e) { e.preventDefault(); });

// Block keyboard shortcuts: Ctrl+U, Ctrl+S, Ctrl+C, Ctrl+A, Ctrl+Shift+I, Ctrl+Shift+J, F12
document.addEventListener("keydown", function(e) {
  // F12
  if (e.key === "F12") { e.preventDefault(); return false; }
  // Ctrl/Cmd shortcuts
  if (e.ctrlKey || e.metaKey) {
    // Ctrl+U (view source), Ctrl+S (save), Ctrl+C (copy), Ctrl+A (select all), Ctrl+P (print)
    if (["u","s","c","a","p"].includes(e.key.toLowerCase())) { e.preventDefault(); return false; }
    // Ctrl+Shift+I (dev tools), Ctrl+Shift+J (console), Ctrl+Shift+C (inspect)
    if (e.shiftKey && ["i","j","c"].includes(e.key.toLowerCase())) { e.preventDefault(); return false; }
  }
});

// Block drag events (prevents dragging images/content)
document.addEventListener("dragstart", function(e) { e.preventDefault(); });

// Block copy/cut events
document.addEventListener("copy", function(e) { e.preventDefault(); });
document.addEventListener("cut", function(e) { e.preventDefault(); });

// Simple SHA-256 hash (built into browsers)
async function hashPassword(pw) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

const AppWithAuth = () => {
  const [authedUser, setAuthedUser] = useState(null);

  useEffect(() => {
    // Check for existing session
    try {
      const session = JSON.parse(sessionStorage.getItem("sct_auth"));
      if (session && session.email && (Date.now() - session.ts) < 8 * 60 * 60 * 1000) { // 8 hour session
        setAuthedUser(session.email);
      }
    } catch(e) {}
  }, []);

  if (!authedUser) {
    return <LoginScreen onLogin={setAuthedUser} />;
  }

  return <Dashboard userEmail={authedUser} onLogout={() => { sessionStorage.removeItem("sct_auth"); setAuthedUser(null); }} />;
};

/* ═══════════════════════════════════════════════
   LIVE FETCH HELPER
   Calls the supreme-otf-api proxy. Returns the most recent value for
   a given measurement+field, or null on failure. The proxy is hardened
   with allow-lists (fleet, measurement, field) and a dev-key gate.
   ═══════════════════════════════════════════════ */
async function fetchLatest(channelKey) {
  if (!USE_LIVE_DATA) return null;
  const spec = FIELD_MAP[channelKey];
  if (!spec) return null;
  try {
    const r = await fetch(`${API_BASE}/api/grafana-query`, {
      method: "POST",
      headers: { "content-type": "application/json" },
      // Note: dev-key must be set on the server side; this fetch from the
      // browser intentionally does not carry the dev-key (proxy will be updated
      // to accept a referer-based gate from supreme-otf.com once we cut over).
      body: JSON.stringify({
        kind: "latest",
        fleet: spec.measurement,
        measurement: spec.measurement,
        field: spec.field,
        tags: spec.tags || undefined,
      }),
    });
    if (!r.ok) return null;
    const j = await r.json();
    const v = j?.data?.results?.A?.frames?.[0]?.data?.values?.[1]?.[0];
    return (typeof v === "number") ? v : null;
  } catch (e) {
    console.warn("[live] fetch failed:", channelKey, e);
    return null;
  }
}

      console.warn("[reports] fetch failed:", res.status, await res.text());
      return { reports: [], error: `HTTP ${res.status}` };
    }
    const data = await res.json();
    const rows = (data.reports || []).map(r => {
      const isDaily = r.report_type === "daily";
      const dateStr = isDaily ? r.report_date : r.period_end;
      const padWell = [r.pad, r.well || r.tank].filter(Boolean).join(" / ");
      const defaultTitle = isDaily
        ? `Daily OTF Report — ${padWell || "—"}`
        : `End of Job Report — ${padWell || "—"}`;
      return {
        id: `report:${r.id}`,
        name: r.title || defaultTitle,
        category: "Report",
        report_type: r.report_type,
        doc_date: dateStr || r.created_at,
        size_bytes: null,
        pad: r.pad || null,
        well: r.well || r.tank || null,
        signed_url: `report.html?id=${encodeURIComponent(r.id)}`,
        created_at: r.created_at,
      };
    });
    return { reports: rows, error: null };
  } catch (e) {
    console.warn("[reports] fetch error:", e);
    return { reports: [], error: String(e) };
  }
}

function formatBytes(b) {
  if (b == null) return "—";
  if (b < 1024) return `${b} B`;
  if (b < 1024*1024) return `${(b/1024).toFixed(0)} KB`;
  return `${(b/(1024*1024)).toFixed(1)} MB`;
}
function formatDate(s) {
  if (!s) return "—";
  // Bare YYYY-MM-DD parses as UTC midnight in JS, which shifts the displayed
  // date back by one day in Central time. Append a local-midnight time to
  // force the runtime to parse it in the user's timezone.
  const isDateOnly = typeof s === "string" && /^\d{4}-\d{2}-\d{2}$/.test(s);
  const d = new Date(isDateOnly ? `${s}T00:00:00` : s);
  if (isNaN(d.getTime())) return s;
  return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}/${String(d.getFullYear()).slice(2)}`;
}

const SensorGauge = ({ label, value, unit, min, max, thresholds, icon, precision=1 }) => {
  const pct = Math.max(0, Math.min(100, ((value-min)/(max-min))*100));
  let status = "normal";
  if (thresholds) {
    if (value <= thresholds.critical) status = "critical";
    else if (value <= thresholds.warn) status = "warning";
    else status = "good";
  }
  const colors = { good:"#22c55e", normal:"#22d3ee", warning:"#f59e0b", critical:"#ef4444" };
  const col = colors[status];

  return (
    <div style={{ background:"rgba(15,23,42,0.7)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, padding:"20px 24px", position:"relative", overflow:"hidden", backdropFilter:"blur(10px)" }}>
      <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:`linear-gradient(90deg, ${col}00, ${col}, ${col}00)`, opacity:0.6 }}/>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12, color:"rgba(255,255,255,0.5)", fontSize:12, fontWeight:600, letterSpacing:1.5, textTransform:"uppercase" }}>
        <span style={{ color:col, opacity:0.8 }}><Icon type={icon} size={14}/></span>{label}
      </div>
      <div style={{ display:"flex", alignItems:"baseline", gap:6 }}>
        <span style={{ fontSize:36, fontWeight:700, color:col, fontFamily:"'JetBrains Mono',monospace", lineHeight:1 }}>
          {typeof value==="number" ? value.toFixed(precision) : value}
        </span>
        <span style={{ fontSize:14, color:"rgba(255,255,255,0.4)", fontWeight:500 }}>{unit}</span>
      </div>
      <div style={{ marginTop:14, height:4, background:"rgba(255,255,255,0.06)", borderRadius:2, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${pct}%`, background:`linear-gradient(90deg, ${col}88, ${col})`, borderRadius:2, transition:"width 0.8s ease" }}/>
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", marginTop:4, fontSize:10, color:"rgba(255,255,255,0.25)" }}>
        <span>{min}</span><span>{max}</span>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════
   SPARKLINE
   ═══════════════════════════════════════════════ */
const Sparkline = ({ data, color="#22d3ee", height=48 }) => {
  const vals = data.map(d => d.v);
  const mn = Math.min(...vals), mx = Math.max(...vals), range = mx-mn||1;
  const w = 600;
  const pts = vals.map((v,i) => `${(i/(vals.length-1))*w},${height-((v-mn)/range)*(height-4)-2}`).join(" ");
  return (
    <svg viewBox={`0 0 ${w} ${height}`} style={{ width:"100%", height }}>
      <defs>
        <linearGradient id="sf" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.15"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={`0,${height} ${pts} ${w},${height}`} fill="url(#sf)"/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5"/>
      {/* current value dot */}
      {vals.length > 0 && (() => {
        const lastPt = pts.split(" ").pop().split(",");
        return <circle cx={lastPt[0]} cy={lastPt[1]} r="3" fill={color} style={{ filter:`drop-shadow(0 0 4px ${color})` }}/>;
      })()}
    </svg>
  );
};

const TankLevel = ({ product, capacity, current, unit, rate, color, reorderAt, container, note }) => {
  const pct = (current/capacity)*100;
  const reorderTriggered = reorderAt != null && current <= reorderAt;
  const empty = current === 0;
  // Format numbers with thousands separators since we're now in 5k–21k territory
  const fmt = (n) => n.toLocaleString(undefined, { maximumFractionDigits: 0 });
  return (
    <div style={{ background:"rgba(15,23,42,0.7)", border:`1px solid ${reorderTriggered ? "rgba(245,158,11,0.35)" : "rgba(255,255,255,0.06)"}`, borderRadius:12, padding:"16px 20px", backdropFilter:"blur(10px)" }}>

      </div>
      <div style={{ display:"flex", alignItems:"baseline", gap:4, marginBottom:8 }}>
        <span style={{ fontSize:26, fontWeight:700, color, fontFamily:"'JetBrains Mono',monospace" }}>{fmt(current)}</span>
        <span style={{ fontSize:12, color:"rgba(255,255,255,0.35)" }}>/ {fmt(capacity)} {unit}</span>
      </div>
      <div style={{ position:"relative", height:8, background:"rgba(255,255,255,0.06)", borderRadius:4, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${pct}%`, background:`linear-gradient(90deg, ${color}88, ${color})`, borderRadius:4, transition:"width 1s ease" }}/>
        {reorderAt != null && (
          <div title={`Reorder at ${fmt(reorderAt)} ${unit}`} style={{ position:"absolute", top:-2, bottom:-2, left:`${(reorderAt/capacity)*100}%`, width:2, background:"rgba(245,158,11,0.65)" }}/>

        <span style={{ fontSize:10, color:"rgba(255,255,255,0.3)" }}>{note || (reorderAt != null ? `Reorder @ ${fmt(reorderAt)} ${unit}` : "")}</span>

      </div>
    </div>
  );
};

                return (
                  <div key={doc.id} style={{
                    display:"flex", alignItems:"center", justifyContent:"space-between",
                    padding:"14px 24px", borderBottom: i<filteredDocs.length-1 ? "1px solid rgba(255,255,255,0.04)" : "none",
                    background: hoveredDoc===doc.id ? "rgba(255,255,255,0.03)" : "transparent", transition:"background 0.15s", cursor:"pointer",
                  }} onMouseEnter={() => setHoveredDoc(doc.id)} onMouseLeave={() => setHoveredDoc(null)} onClick={handleDownload}>
                    <div style={{ display:"flex", alignItems:"center", gap:14, minWidth:0 }}>
                      <div style={{ width:36, height:36, borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0,
                        background:`${c}15`, color:c }}>
                        <Icon type={doc.category==="SDS" ? "shield" : (isReport ? "log" : "file")} size={16}/>
                      </div>
                      <div style={{ minWidth:0 }}>
                        <div style={{ fontSize:13, fontWeight:500, color:"rgba(255,255,255,0.85)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{doc.name}</div>
                        <div style={{ fontSize:11, color:"rgba(255,255,255,0.3)", marginTop:2 }}>
                          <span style={{ display:"inline-block", padding:"1px 6px", borderRadius:3, fontSize:10, fontWeight:600, marginRight:8, background:`${c}15`, color:c }}>{isReport ? (doc.report_type==="daily" ? "Daily Report" : "End of Job") : doc.category}</span>
                          {formatDate(doc.doc_date || doc.created_at)}{!isReport && ` · ${formatBytes(doc.size_bytes)}`}
                          {doc.pad && <span style={{ marginLeft:8, color:"rgba(255,255,255,0.4)" }}>· {doc.pad}{doc.well ? ` / ${doc.well}` : ""}</span>}
                        </div>
                      </div>
                    </div>
                    <button onClick={handleDownload} style={{
                      background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)",
                      borderRadius:6, padding:"6px 14px", cursor:"pointer", flexShrink:0,
                      display:"flex", alignItems:"center", gap:5, fontSize:11, fontWeight:600,
                      color: hoveredDoc===doc.id ? "#22d3ee" : "rgba(255,255,255,0.5)",
                      borderColor: hoveredDoc===doc.id ? "rgba(34,211,238,0.3)" : "rgba(255,255,255,0.08)",
                      transition:"all 0.15s", fontFamily:"'DM Sans',sans-serif",
                    }}>
                      <Icon type="download" size={12}/> {isReport ? "Open" : "Download"}
                    </button>
                  </div>
                );
              })}
            </div>

            <div style={{ marginTop:16, padding:"12px 16px", borderRadius:8, background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.04)", fontSize:11, color:"rgba(255,255,255,0.3)" }}>
              Documents are uploaded by SCT and available for download at any time. For additional reports or data requests, contact your SCT representative at (432) 701-0318.
            </div>
          </div>
        )}
      </main>

      {/* Footer */}
      <footer style={{ borderTop:"1px solid rgba(255,255,255,0.04)", padding:"16px 32px", textAlign:"center" }}>
        <span style={{ fontSize:11, color:"rgba(255,255,255,0.2)" }}>
          © 2026 Supreme Chemical Technology · Midland, TX · (432) 701-0318 · All data is proprietary and confidential
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppWithAuth/>);
</script>
</body>
</html>
